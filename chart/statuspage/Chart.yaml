apiVersion: v2
name: statuspage
description: A status page application with incident management and real-time updates
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: postgresql
    version: "18.5.15"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: centrifugo
    version: "11.8.10"
    repository: https://centrifugal.github.io/helm-charts
    condition: centrifugo.enabled
  - name: traefik
    version: "39.0.7"
    repository: https://traefik.github.io/charts
    condition: traefik.enabled
  - name: replicated
    repository: oci://registry.replicated.com/library
    version: "1.19.0"
