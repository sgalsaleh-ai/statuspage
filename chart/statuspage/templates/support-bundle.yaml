apiVersion: v1
kind: Secret
metadata:
  name: {{ include "statuspage.fullname" . }}-support-bundle
  labels:
    {{- include "statuspage.labels" . | nindent 4 }}
    troubleshoot.sh/kind: support-bundle
stringData:
  support-bundle-spec: |
    apiVersion: troubleshoot.sh/v1beta2
    kind: SupportBundle
    metadata:
      name: statuspage-support-bundle
    spec:
      collectors:
        - logs:
            name: app-logs
            selector:
              - app.kubernetes.io/name=statuspage
            namespace: {{ .Release.Namespace }}
            limits:
              maxAge: 720h
              maxLines: 10000
        - logs:
            name: postgresql-logs
            selector:
              - app.kubernetes.io/name=postgresql
            namespace: {{ .Release.Namespace }}
            limits:
              maxAge: 720h
              maxLines: 5000
        - logs:
            name: centrifugo-logs
            selector:
              - app.kubernetes.io/name=centrifugo
            namespace: {{ .Release.Namespace }}
            limits:
              maxAge: 720h
              maxLines: 5000
        - logs:
            name: sdk-logs
            selector:
              - app.kubernetes.io/name=statuspage-sdk
            namespace: {{ .Release.Namespace }}
            limits:
              maxAge: 720h
              maxLines: 5000
        - http:
            collectorName: healthz
            get:
              url: http://{{ include "statuspage.fullname" . }}.{{ .Release.Namespace }}.svc:{{ .Values.service.port }}/healthz
              timeout: 10s
      analyzers:
        - textAnalyze:
            checkName: StatusPage Health Endpoint
            fileName: healthz.json
            regex: '"status":\s*"ok"'
            outcomes:
              - pass:
                  when: "true"
                  message: StatusPage health endpoint returned OK. Database and Centrifugo are healthy.
              - fail:
                  when: "false"
                  message: >
                    StatusPage health endpoint did not return OK.
                    Check app logs for database or Centrifugo connection errors.
                    Verify PostgreSQL and Centrifugo pods are running.
        - deploymentStatus:
            name: {{ include "statuspage.fullname" . }}
            namespace: {{ .Release.Namespace }}
            outcomes:
              - fail:
                  when: "absent"
                  message: StatusPage deployment is missing. The application is not deployed.
              - fail:
                  when: "< 1"
                  message: >
                    StatusPage has zero ready replicas. The status page is unavailable.
                    Check pod logs: kubectl logs -l app.kubernetes.io/name=statuspage
              - pass:
                  message: StatusPage deployment is healthy.
        - deploymentStatus:
            name: {{ .Release.Name }}-centrifugo
            namespace: {{ .Release.Namespace }}
            outcomes:
              - fail:
                  when: "absent"
                  message: Centrifugo deployment is missing. Real-time updates will not work.
              - fail:
                  when: "< 1"
                  message: >
                    Centrifugo has zero ready replicas. Live status updates are unavailable.
                    The public page will still load but won't update in real-time.
              - pass:
                  message: Centrifugo deployment is healthy.
        - deploymentStatus:
            name: statuspage-sdk
            namespace: {{ .Release.Namespace }}
            outcomes:
              - fail:
                  when: "absent"
                  message: Replicated SDK is missing. License enforcement and metrics will not function.
              - fail:
                  when: "< 1"
                  message: Replicated SDK has zero ready replicas. License validation is unavailable.
              - pass:
                  message: Replicated SDK deployment is healthy.
        - statefulsetStatus:
            name: {{ .Release.Name }}-postgresql
            namespace: {{ .Release.Namespace }}
            outcomes:
              - fail:
                  when: "absent"
                  message: PostgreSQL StatefulSet is missing. The database is not deployed.
              - fail:
                  when: "< 1"
                  message: >
                    PostgreSQL has zero ready replicas. The database is down.
                    All application functionality is unavailable.
                    Check PVC status: kubectl get pvc -l app.kubernetes.io/name=postgresql
              - pass:
                  message: PostgreSQL StatefulSet is healthy.
        - textAnalyze:
            checkName: Database Connection Failures
            fileName: app-logs/*.log
            regex: "failed to connect to database|failed to open database|database not ready after"
            outcomes:
              - fail:
                  when: "true"
                  message: >
                    Database connection errors found in application logs.
                    Verify PostgreSQL is running: kubectl get pods -l app.kubernetes.io/name=postgresql
                    Check database credentials and connection settings.
              - pass:
                  when: "false"
                  message: No database connection errors found in application logs.
        - textAnalyze:
            checkName: Centrifugo Publish Failures
            fileName: app-logs/*.log
            regex: "failed to publish.*event|centrifugo returned status [45]"
            outcomes:
              - fail:
                  when: "true"
                  message: >
                    Centrifugo publish errors found in application logs.
                    Real-time updates may not reach the public status page.
                    Verify Centrifugo is running and check the API key configuration.
              - pass:
                  when: "false"
                  message: No Centrifugo publish errors found in application logs.
        - storageClass:
            checkName: Default Storage Class
            outcomes:
              - fail:
                  message: >
                    No default storage class found. PostgreSQL requires a storage class
                    to provision persistent volumes. Configure a default storage class
                    or specify one in the Helm values.
              - pass:
                  message: Default storage class is configured.
        - nodeResources:
            checkName: Node Readiness
            outcomes:
              - fail:
                  when: "nodeCondition(Ready) == False"
                  message: >
                    One or more nodes are not Ready. StatusPage pods may fail to schedule.
                    Run 'kubectl get nodes' to identify unhealthy nodes.
              - pass:
                  message: All nodes are in Ready state.
