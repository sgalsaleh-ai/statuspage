apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "statuspage.fullname" . }}
  labels:
    {{- include "statuspage.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "statuspage.fullname" . }}-support-bundle
  labels:
    {{- include "statuspage.labels" . | nindent 4 }}
rules:
  # Required for support-bundle --load-cluster-specs
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces", "nodes", "persistentvolumeclaims", "events"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "statuspage.fullname" . }}-support-bundle
  labels:
    {{- include "statuspage.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "statuspage.fullname" . }}-support-bundle
subjects:
  - kind: ServiceAccount
    name: {{ include "statuspage.fullname" . }}
    namespace: {{ .Release.Namespace }}
