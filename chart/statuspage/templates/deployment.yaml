apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "statuspage.fullname" . }}
  labels:
    {{- include "statuspage.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "statuspage.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "statuspage.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "statuspage.fullname" . }}
      {{- include "statuspage.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-db
          image: {{ .Values.initImage }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at {{ include "statuspage.dbHost" . }}:{{ include "statuspage.dbPort" . }}..."
              until nc -z {{ include "statuspage.dbHost" . }} {{ include "statuspage.dbPort" . }}; do
                echo "PostgreSQL is not ready yet..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: statuspage
          image: {{ include "statuspage.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DB_HOST
              value: {{ include "statuspage.dbHost" . | quote }}
            - name: DB_PORT
              value: {{ include "statuspage.dbPort" . | quote }}
            - name: DB_USER
              value: {{ include "statuspage.dbUser" . | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "statuspage.fullname" . }}-secrets
                  key: db-password
            - name: DB_NAME
              value: {{ include "statuspage.dbName" . | quote }}
            - name: DB_SSLMODE
              value: {{ .Values.externalPostgresql.sslmode | default "disable" | quote }}
            - name: CENTRIFUGO_URL
              value: {{ include "statuspage.centrifugoURL" . | quote }}
            - name: CENTRIFUGO_PUBLIC_URL
              value: {{ include "statuspage.centrifugoPublicURL" . | quote }}
            - name: CENTRIFUGO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "statuspage.fullname" . }}-secrets
                  key: centrifugo-api-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "statuspage.fullname" . }}-secrets
                  key: jwt-secret
            - name: RESEND_FROM_ADDRESS
              value: {{ .Values.app.resendFromAddress | quote }}
            {{- if .Values.global }}{{- if .Values.global.replicated }}{{- if .Values.global.replicated.licenseFields }}{{- if index .Values.global.replicated.licenseFields "resend_api_key" }}
            - name: RESEND_API_KEY
              value: {{ (index .Values.global.replicated.licenseFields "resend_api_key").value | quote }}
            {{- end }}{{- end }}{{- end }}{{- end }}
            - name: ENABLE_NOTIFICATIONS
              value: {{ .Values.app.enableNotifications | quote }}
            {{- if .Values.app.adminPassword }}
            - name: ADMIN_PASSWORD
              value: {{ .Values.app.adminPassword | quote }}
            {{- end }}
            - name: PAGE_TITLE
              value: {{ .Values.app.pageTitle | quote }}
            - name: PAGE_HEADER_TEXT
              value: {{ .Values.app.pageHeaderText | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
