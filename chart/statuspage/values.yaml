# StatusPage Application
replicaCount: 1

image:
  registry: statuspage-proxy.puresoft.app
  repository: proxy/statuspage/ghcr.io/sgalsaleh-ai/statuspage
  tag: latest
  pullPolicy: Always

initImage: statuspage-proxy.puresoft.app/proxy/statuspage/docker.io/library/busybox:1.36

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8080
  nodePort: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: status.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

tls:
  # auto: cert-manager auto-provision via Let's Encrypt
  # manual: user provides a TLS secret
  # selfSigned: generate self-signed certificate
  # none: no TLS
  mode: none
  # Required for auto mode
  host: ""
  clusterIssuer: letsencrypt-prod
  # Required for manual mode
  secretName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# App configuration
app:
  jwtSecret: "" # @docs:skip
  resendFromAddress: "StatusPage <onboarding@resend.dev>"
  adminPassword: ""
  enableSupportBundle: true
  pageTitle: "StatusPage"
  pageHeaderText: ""
  # URL browsers use to connect to Centrifugo WebSocket (must be reachable from the browser)
  # Leave empty to use the in-cluster URL (only works with ingress or port-forward)
  centrifugoPublicURL: ""

# Embedded PostgreSQL (Bitnami subchart)
postgresql:
  enabled: true
  image:
    registry: statuspage-proxy.puresoft.app
    repository: proxy/statuspage/docker.io/bitnami/postgresql
  global:
    security:
      allowInsecureImages: true
    imagePullSecrets:
      - statuspage-replicated-pull-secret
  auth:
    username: statuspage
    password: statuspage
    database: statuspage
  primary:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# External PostgreSQL (when postgresql.enabled=false)
externalPostgresql:
  host: ""
  port: "5432"
  user: ""
  password: ""
  database: ""
  sslmode: "disable"

# Centrifugo v5 (subchart) — always embedded, handles real-time WebSocket updates
centrifugo:
  enabled: true
  global:
    imagePullSecrets:
      - statuspage-replicated-pull-secret
  image:
    registry: statuspage-proxy.puresoft.app
    repository: proxy/statuspage/docker.io/centrifugo/centrifugo
  config:
    api_key: "statuspage-api-key"
    allowed_origins: "*"
    allow_subscribe_for_client: true
    client_insecure: true
    namespaces: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Replicated SDK (subchart)
replicated:
  image:
    registry: statuspage-proxy.puresoft.app
    repository: library/replicated-sdk-image
  nameOverride: statuspage-sdk
  statusInformers:
    - deployment/statuspage
    - deployment/statuspage-centrifugo
    - deployment/statuspage-sdk
    - statefulset/statuspage-postgresql
    - service/statuspage
    - service/statuspage-postgresql
