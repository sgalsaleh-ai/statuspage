# StatusPage Application
replicaCount: 1

image:
  repository: statuspage
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: status.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

tls:
  # auto: cert-manager auto-provision via Let's Encrypt
  # manual: user provides a TLS secret
  # selfSigned: generate self-signed certificate
  # none: no TLS
  mode: none
  # Required for auto mode
  host: ""
  clusterIssuer: letsencrypt-prod
  # Required for manual mode
  secretName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# App configuration
app:
  jwtSecret: ""
  resendApiKey: ""
  resendFromAddress: "StatusPage <notifications@statuspage.dev>"

# Embedded PostgreSQL (Bitnami subchart)
postgresql:
  enabled: true
  auth:
    username: statuspage
    password: statuspage
    database: statuspage
  primary:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# External PostgreSQL (when postgresql.enabled=false)
externalPostgresql:
  host: ""
  port: "5432"
  user: ""
  password: ""
  database: ""
  sslmode: "disable"

# Embedded Centrifugo (subchart)
centrifugo:
  enabled: true
  config:
    client:
      allowed_origins: ["*"]
    channel:
      namespaces: []
  env:
    CENTRIFUGO_HTTP_API_KEY: "statuspage-api-key"
    CENTRIFUGO_ALLOW_SUBSCRIBE_FOR_CLIENT: "true"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# External Centrifugo (when centrifugo.enabled=false)
externalCentrifugo:
  url: ""
  apiKey: ""
