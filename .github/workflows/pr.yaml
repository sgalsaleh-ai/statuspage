name: PR

on:
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sgalsaleh-ai/statuspage

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release-and-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      REPLICATED_APP: ${{ secrets.REPLICATED_APP }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL | tar xz -C /usr/local/bin replicated

      - name: Create release
        run: |
          replicated release create \
            --promote "pr-${{ github.event.pull_request.number }}" \
            --version "0.0.0-pr${{ github.event.pull_request.number }}.${{ github.run_number }}" \
            --ensure-channel \
            -o json

      - name: Create CMX cluster
        id: cluster
        run: |
          CLUSTER_ID=$(replicated cluster create \
            --distribution kind \
            --version 1.32.11 \
            --name "pr-${{ github.event.pull_request.number }}-${{ github.run_number }}" \
            --ttl 20m \
            --wait 5m \
            -o json | jq -r '.id')
          echo "cluster-id=$CLUSTER_ID" >> "$GITHUB_OUTPUT"
          replicated cluster kubeconfig "$CLUSTER_ID" --stdout > /tmp/kubeconfig

      - name: Install app via Helm
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          helm registry login registry.replicated.com \
            --username "${{ secrets.REPLICATED_APP }}" \
            --password "${{ secrets.REPLICATED_API_TOKEN }}"
          helm install statuspage \
            oci://registry.replicated.com/${{ secrets.REPLICATED_APP }}/pr-${{ github.event.pull_request.number }}/statuspage \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=pr${{ github.event.pull_request.number }} \
            --wait --timeout 120s

      - name: Verify deployment
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          kubectl get pods -A

      - name: Remove cluster
        if: always()
        run: |
          if [ -n "${{ steps.cluster.outputs.cluster-id }}" ]; then
            replicated cluster rm "${{ steps.cluster.outputs.cluster-id }}"
          fi

      - name: Archive channel
        if: always()
        run: |
          replicated channel delete "pr-${{ github.event.pull_request.number }}" || true
