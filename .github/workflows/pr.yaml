name: PR

on:
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sgalsaleh-ai/statuspage

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      release-sequence: ${{ steps.create-release.outputs.release-sequence }}
      channel-slug: ${{ steps.create-release.outputs.channel-slug }}
    steps:
      - uses: actions/checkout@v4

      - name: Package Helm chart
        run: |
          helm dependency update ./chart/statuspage
          helm package ./chart/statuspage -d ./kots \
            --version 0.0.0-pr${{ github.event.pull_request.number }}

      - name: Update image in HelmChart CR
        run: |
          sed -i 's|chartVersion: .*|chartVersion: 0.0.0-pr${{ github.event.pull_request.number }}|' kots/helmchart.yaml

      - uses: replicatedhq/replicated-actions/create-release@v1
        id: create-release
        with:
          app-slug: ${{ secrets.REPLICATED_APP }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: ./kots
          promote-channel: pr-${{ github.event.pull_request.number }}
          version: pr-${{ github.event.pull_request.number }}-${{ github.run_number }}

  test:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cluster:
          - distribution: kind
            version: v1.29.0
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        id: create-cluster
        uses: replicatedhq/replicated-actions/create-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          kubernetes-distribution: ${{ matrix.cluster.distribution }}
          kubernetes-version: ${{ matrix.cluster.version }}
          cluster-name: pr-${{ github.event.pull_request.number }}-${{ github.run_number }}
          ttl: 20m

      - name: Install app
        uses: replicatedhq/replicated-actions/helm-install@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          app-slug: ${{ secrets.REPLICATED_APP }}
          channel-slug: ${{ needs.create-release.outputs.channel-slug }}
          helm-chart-name: statuspage
          kubeconfig: ${{ steps.create-cluster.outputs.cluster-kubeconfig }}
          helm-run-preflights: false
          helm-values: |
            image:
              repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
              tag: pr${{ github.event.pull_request.number }}

      - name: Verify deployment
        run: |
          echo "${{ steps.create-cluster.outputs.cluster-kubeconfig }}" > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl wait --for=condition=available deployment/statuspage --timeout=120s
          kubectl get pods

      - name: Remove cluster
        if: always()
        uses: replicatedhq/replicated-actions/remove-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}

  cleanup:
    needs: [create-release, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: replicatedhq/replicated-actions/archive-channel@v1
        with:
          app-slug: ${{ secrets.REPLICATED_APP }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          channel-slug: ${{ needs.create-release.outputs.channel-slug }}
