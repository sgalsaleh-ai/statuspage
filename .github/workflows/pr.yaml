name: PR

on:
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sgalsaleh-ai/statuspage

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./internal/...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-and-test-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package Helm chart
        run: |
          helm dependency update ./chart/statuspage
          helm lint ./chart/statuspage
          helm package ./chart/statuspage -d ./kots \
            --version 0.0.0-pr${{ github.event.pull_request.number }}

      - name: Update chart version in HelmChart CR
        run: |
          sed -i 's|chartVersion: .*|chartVersion: 0.0.0-pr${{ github.event.pull_request.number }}|' kots/helmchart.yaml

      - uses: replicatedhq/replicated-actions/create-release@v1
        id: create-release
        with:
          app-slug: ${{ secrets.REPLICATED_APP }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: ./kots
          promote-channel: pr-${{ github.event.pull_request.number }}
          version: pr-${{ github.event.pull_request.number }}-${{ github.run_number }}

  cleanup:
    needs: create-and-test-release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: replicatedhq/replicated-actions/archive-channel@v1
        with:
          app-slug: ${{ secrets.REPLICATED_APP }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          channel-slug: pr-${{ github.event.pull_request.number }}
