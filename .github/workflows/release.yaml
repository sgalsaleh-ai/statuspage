name: Release

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sgalsaleh-ai/statuspage

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign image with cosign
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  release-and-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      REPLICATED_APP: ${{ secrets.REPLICATED_APP }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL | tar xz -C /usr/local/bin replicated

      - name: Set version
        id: version
        run: echo "version=0.1.0+${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create release and promote to Unstable
        id: release
        run: |
          replicated release create \
            --promote Unstable \
            --version "${{ steps.version.outputs.version }}" \
            -o json

      - name: Create test customer
        id: customer
        run: |
          CUSTOMER=$(replicated customer create \
            --name "ci-release-${{ github.run_number }}" \
            --channel Unstable \
            --type dev \
            --expires-in 1h \
            --ensure-channel \
            -o json)
          echo "customer-id=$(echo $CUSTOMER | jq -r '.id')" >> "$GITHUB_OUTPUT"
          LICENSE_ID=$(replicated customer download-license \
            --customer "ci-release-${{ github.run_number }}" 2>&1 | grep "licenseID:" | awk '{print $2}')
          echo "license-id=$LICENSE_ID" >> "$GITHUB_OUTPUT"

      - name: Create CMX cluster
        id: cluster
        run: |
          CLUSTER_ID=$(replicated cluster create \
            --distribution kind \
            --version 1.32.11 \
            --name "release-${{ github.run_number }}" \
            --ttl 20m \
            --wait 5m \
            -o json | jq -r '.id')
          echo "cluster-id=$CLUSTER_ID" >> "$GITHUB_OUTPUT"
          replicated cluster kubeconfig "$CLUSTER_ID" --stdout > /tmp/kubeconfig

      - name: Install app via Helm
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          helm registry login registry.replicated.com \
            --username "${{ secrets.REPLICATED_APP }}" \
            --password "${{ steps.customer.outputs.license-id }}"
          helm install statuspage \
            oci://registry.replicated.com/${{ secrets.REPLICATED_APP }}/unstable/statuspage \
            --set image.tag=latest \
            --wait --timeout 180s

      - name: Verify deployment
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          kubectl wait --for=condition=available deployment/statuspage --timeout=120s
          kubectl rollout status deployment/statuspage
          kubectl get pods

      - name: Collect support bundle on failure
        if: failure()
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          curl -sL https://github.com/replicatedhq/troubleshoot/releases/latest/download/support-bundle_linux_amd64.tar.gz | tar xz -C /usr/local/bin support-bundle
          support-bundle --load-cluster-specs --interactive=false -o /tmp/support-bundle || true

      - name: Upload support bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: support-bundle
          path: /tmp/support-bundle.tar.gz

      - name: Remove cluster
        if: always()
        run: |
          if [ -n "${{ steps.cluster.outputs.cluster-id }}" ]; then
            replicated cluster rm "${{ steps.cluster.outputs.cluster-id }}"
          fi

      - name: Archive test customer
        if: always()
        run: |
          replicated customer archive "${{ steps.customer.outputs.customer-id }}" || true
