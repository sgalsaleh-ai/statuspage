name: Release

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sgalsaleh-ai/statuspage

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release-and-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      REPLICATED_APP: ${{ secrets.REPLICATED_APP }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL | tar xz -C /usr/local/bin replicated

      - name: Set version
        id: version
        run: echo "version=0.1.0-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Package Helm chart
        run: |
          helm dependency update ./chart/statuspage
          helm package ./chart/statuspage -d ./kots \
            --version ${{ steps.version.outputs.version }}

      - name: Update chart version in HelmChart CR
        run: |
          sed -i 's|chartVersion: .*|chartVersion: ${{ steps.version.outputs.version }}|' kots/helmchart.yaml

      - name: Create release and promote to Unstable
        id: release
        run: |
          SEQUENCE=$(replicated release create \
            --yaml-dir ./kots \
            --promote Unstable \
            --version "${{ steps.version.outputs.version }}" \
            --auto -o json | jq -r '.sequence')
          echo "sequence=$SEQUENCE" >> "$GITHUB_OUTPUT"

      - name: Create CMX cluster
        id: cluster
        run: |
          CLUSTER_ID=$(replicated cluster create \
            --distribution kind \
            --version 1.32.11 \
            --name "release-${{ github.run_number }}" \
            --ttl 20m \
            --wait 5m \
            -o json | jq -r '.id')
          echo "cluster-id=$CLUSTER_ID" >> "$GITHUB_OUTPUT"
          replicated cluster kubeconfig --id "$CLUSTER_ID" > /tmp/kubeconfig

      - name: Install app via Helm
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          helm registry login registry.replicated.com \
            --username "${{ secrets.REPLICATED_APP }}" \
            --password "${{ secrets.REPLICATED_API_TOKEN }}"
          helm install statuspage \
            oci://registry.replicated.com/${{ secrets.REPLICATED_APP }}/statuspage \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${GITHUB_SHA} \
            --wait --timeout 120s

      - name: Verify deployment
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          kubectl get pods -A
          kubectl wait --for=condition=available deployment/statuspage --timeout=60s

      - name: Remove cluster
        if: always()
        run: |
          if [ -n "${{ steps.cluster.outputs.cluster-id }}" ]; then
            replicated cluster rm --id "${{ steps.cluster.outputs.cluster-id }}"
          fi
