name: Release

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sgalsaleh-ai/statuspage

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./internal/...

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-and-test-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=0.1.0-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Package Helm chart
        run: |
          helm dependency update ./chart/statuspage
          helm lint ./chart/statuspage
          helm package ./chart/statuspage -d ./kots \
            --version ${{ steps.version.outputs.version }}

      - name: Update chart version in HelmChart CR
        run: |
          sed -i 's|chartVersion: .*|chartVersion: ${{ steps.version.outputs.version }}|' kots/helmchart.yaml

      - uses: replicatedhq/replicated-actions/create-release@v1
        id: create-release
        with:
          app-slug: ${{ secrets.REPLICATED_APP }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: ./kots
          promote-channel: Unstable
          version: ${{ steps.version.outputs.version }}
