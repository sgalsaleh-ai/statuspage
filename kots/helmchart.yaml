apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: statuspage
spec:
  chart:
    name: statuspage
    chartVersion: 0.1.0
  releaseName: statuspage
  namespace: default
  weight: 0
  helmUpgradeFlags:
    - --wait
    - --timeout=600s

  values:
    service:
      type: NodePort
      nodePort: 30880

    # App image rewrite (noProxy=true because defaults already point to proxy)
    image:
      registry: '{{repl ReplicatedImageRegistry (HelmValue ".image.registry") true }}'
      repository: '{{repl ReplicatedImageRepository (HelmValue ".image.repository") true }}'
    imagePullSecrets:
      - name: '{{repl ImagePullSecretName }}'

    # PostgreSQL image rewrite (Bitnami uses registry + repository split)
    postgresql:
      enabled: repl{{ ConfigOptionEquals `db_type` `embedded` }}
      auth:
        password: repl{{ ConfigOption `embedded_db_password` }}
      image:
        registry: '{{repl ReplicatedImageRegistry (HelmValue ".postgresql.image.registry") }}'
        repository: '{{repl ReplicatedImageRepository (print (HelmValue ".postgresql.image.registry") "/" (HelmValue ".postgresql.image.repository")) }}'
      global:
        imagePullSecrets:
          - '{{repl ImagePullSecretName }}'

    # Centrifugo image rewrite (uses registry + repository split)
    centrifugo:
      image:
        registry: '{{repl ReplicatedImageRegistry (HelmValue ".centrifugo.image.registry") }}'
        repository: '{{repl ReplicatedImageRepository (print (HelmValue ".centrifugo.image.registry") "/" (HelmValue ".centrifugo.image.repository")) }}'
      imagePullSecrets:
        - name: '{{repl ImagePullSecretName }}'

    # Replicated SDK image rewrite (noProxy=true, hosted in replicated registry)
    replicated:
      image:
        registry: 'repl{{ ReplicatedImageRegistry "proxy.replicated.com" }}'
        repository: 'repl{{ ReplicatedImageRepository "library/replicated-sdk-image" true }}'
      imagePullSecrets:
        - name: '{{repl ImagePullSecretName }}'

    app:
      adminPassword: repl{{ ConfigOption `admin_password` }}
      enableNotifications: repl{{ ConfigOptionEquals `enable_notifications` `1` }}
      pageTitle: repl{{ ConfigOption `page_title` }}
      pageHeaderText: repl{{ ConfigOption `page_header_text` }}

  optionalValues:
    - when: "repl{{ ConfigOptionEquals `db_type` `external` }}"
      recursiveMerge: true
      values:
        externalPostgresql:
          host: "repl{{ ConfigOption `external_db_host` }}"
          port: "repl{{ ConfigOption `external_db_port` }}"
          user: "repl{{ ConfigOption `external_db_user` }}"
          password: "repl{{ ConfigOption `external_db_password` }}"
          database: "repl{{ ConfigOption `external_db_name` }}"

  builder:
    postgresql:
      enabled: true
