apiVersion: kots.io/v1beta1
kind: Config
metadata:
  name: statuspage
spec:
  groups:
    - name: database
      title: Database
      description: Configure the PostgreSQL database for StatusPage.
      items:
        - name: db_type
          title: Database Type
          type: radio
          default: embedded
          help_text: |
            Choose "Embedded" to deploy PostgreSQL as part of this installation.
            Choose "External" to connect to an existing PostgreSQL instance you manage.
          items:
            - name: embedded
              title: Embedded (built-in PostgreSQL)
            - name: external
              title: External (bring your own)

        - name: embedded_db_password
          title: Embedded Database Password
          type: password
          hidden: true
          readonly: false
          value: '{{repl RandomString 24}}'
          help_text: Auto-generated password for the embedded PostgreSQL database. This value persists across upgrades.

        - name: external_db_host
          title: Database Host
          type: text
          when: 'repl{{ ConfigOptionEquals "db_type" "external" }}'
          required: true
          help_text: The hostname or IP address of your external PostgreSQL server (e.g. db.example.com).

        - name: external_db_port
          title: Database Port
          type: text
          default: "5432"
          when: 'repl{{ ConfigOptionEquals "db_type" "external" }}'
          required: true
          help_text: The port your PostgreSQL server listens on. Default is 5432.
          validation:
            regex:
              pattern: '^\d{1,5}$'
              message: "Port must be a number between 1 and 65535."

        - name: external_db_name
          title: Database Name
          type: text
          default: "statuspage"
          when: 'repl{{ ConfigOptionEquals "db_type" "external" }}'
          required: true
          help_text: The name of the PostgreSQL database to use (e.g. statuspage).

        - name: external_db_user
          title: Database Username
          type: text
          default: "statuspage"
          when: 'repl{{ ConfigOptionEquals "db_type" "external" }}'
          required: true
          help_text: The username to authenticate with your PostgreSQL database.

        - name: external_db_password
          title: Database Password
          type: password
          when: 'repl{{ ConfigOptionEquals "db_type" "external" }}'
          required: true
          help_text: The password for the database user specified above.

        - name: external_db_sslmode
          title: SSL Mode
          type: text
          default: "require"
          when: 'repl{{ ConfigOptionEquals "db_type" "external" }}'
          help_text: |
            PostgreSQL SSL mode. Use "require" for cloud-hosted databases (Neon, RDS, etc.)
            or "disable" for local/private databases. Valid values: disable, require, verify-ca, verify-full.

    - name: networking
      title: Networking
      description: Configure how the application is accessed.
      items:
        - name: access_type
          title: Access Type
          type: radio
          default: node_port
          help_text: |
            Choose "NodePort" for direct access on a fixed port.
            Choose "Ingress" to use the Traefik ingress controller with a hostname.
          items:
            - name: node_port
              title: NodePort (direct access on port 30880)
            - name: ingress
              title: Ingress (via Traefik with hostname)

        - name: ingress_hostname
          title: Hostname
          type: text
          when: 'repl{{ ConfigOptionEquals "access_type" "ingress" }}'
          required: true
          help_text: |
            The hostname to access the status page (e.g. status.example.com).
            DNS must point to this server's IP address.
          validation:
            regex:
              pattern: '^[a-zA-Z0-9]([a-zA-Z0-9\-]*[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9\-]*[a-zA-Z0-9])?)*$'
              message: "Enter a valid hostname (e.g. status.example.com)."

    - name: admin
      title: Application
      description: Configure the StatusPage application.
      items:
        - name: admin_password
          title: Admin Password
          type: password
          required: true
          help_text: |
            The password for the StatusPage admin account.
            Must be at least 8 characters. Used to log in to the admin dashboard.
          validation:
            regex:
              pattern: '^.{8,}$'
              message: "Password must be at least 8 characters."

        - name: enable_support_bundle
          title: Enable Support Bundle Generation
          type: bool
          default: "1"
          help_text: |
            When enabled, a "Generate Support Bundle" button appears on the admin dashboard.
            This collects diagnostic data and uploads it to the vendor for troubleshooting.
            Disable to hide the button from the admin UI.

    - name: appearance
      title: Appearance
      description: Customize the look of your public status page.
      items:
        - name: page_title
          title: Status Page Title
          type: text
          default: "StatusPage"
          help_text: |
            The title shown in the header of the public status page and browser tab.
            For example, "Acme Corp Status" or "Platform Health".

        - name: page_header_text
          title: Header Description
          type: text
          default: ""
          help_text: |
            Optional text shown below the title on the public status page.
            Use this to describe what systems this page covers, e.g. "Real-time status for all Acme services."
