services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=statuspage
      - DB_PASSWORD=statuspage
      - DB_NAME=statuspage
      - CENTRIFUGO_URL=http://centrifugo:8000
      - CENTRIFUGO_PUBLIC_URL=http://localhost:8000
      - CENTRIFUGO_API_KEY=statuspage-api-key
      - JWT_SECRET=dev-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=statuspage
      - POSTGRES_PASSWORD=statuspage
      - POSTGRES_DB=statuspage
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statuspage"]
      interval: 2s
      timeout: 5s
      retries: 10

  centrifugo:
    image: centrifugo/centrifugo:v5
    ports:
      - "8000:8000"
    environment:
      - CENTRIFUGO_API_KEY=statuspage-api-key
      - CENTRIFUGO_ALLOWED_ORIGINS=*
      - CENTRIFUGO_CLIENT_INSECURE=true
    command: centrifugo

volumes:
  pgdata:
